appId: io.github.thilinatlm.nerve
productName: Nerve
executableName: nerve-desktop
artifactName: Nerve-Desktop-${version}-${arch}.${ext}
copyright: Copyright © 2026 ThilinaTLM

directories:
  output: release

files:
  - dist/**
  - build/**
  - package.json

asarUnpack:
  - build/**

extraResources:
  - from: ../web/dist
    to: web-dist
  - from: ../../LICENSE
    to: LICENSE
  - from: ../../NOTICE
    to: NOTICE

linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Development
  executableName: nerve-desktop
  maintainer: ThilinaTLM
  icon: build/icons
  syncDesktopName: true
  desktop:
    entry:
      Name: Nerve
      GenericName: AI coding harness
      Comment: UI-first personal AI coding harness
      StartupWMClass: nerve
      Keywords: AI;Coding;Agent;Developer;Nerve;
