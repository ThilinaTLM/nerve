name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux desktop packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        run: pnpm release:verify-tag -- "${{ github.ref_name }}"

      - name: Type-check packages
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build Linux desktop artifacts
        run: pnpm release:desktop:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-desktop
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/*.rpm
            packages/desktop/release/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  npm-smoke:
    name: npm package smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: pnpm release:build

      - name: Pack npm tarballs
        run: pnpm release:pack:npm

      - name: Verify desktop bin launcher
        run: node packages/desktop/dist/bin.js --version

  publish-npm:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - npm-smoke
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Verify Node 24 and npm >= 11.5.1
        shell: bash
        run: |
          node_version="$(node --version)"
          echo "node: ${node_version}"
          case "${node_version}" in
            v24.*) ;;
            *) echo "Expected Node 24, got ${node_version}" >&2; exit 1 ;;
          esac
          npm_version="$(npm --version)"
          echo "npm: ${npm_version}"
          # Trusted publishing (OIDC) requires npm >= 11.5.1.
          if [ "$(printf '%s\n11.5.1\n' "${npm_version}" | sort -V | head -n1)" != "11.5.1" ]; then
            echo "Upgrading npm to satisfy trusted publishing (>= 11.5.1)"
            npm install -g npm@latest
            echo "npm: $(npm --version)"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: pnpm release:build

      - name: Pack npm tarballs
        run: node scripts/pack-npm.mjs

      - name: Publish tarballs (skip already-published versions)
        shell: bash
        run: |
          set -euo pipefail
          # Publish in dependency-friendly order.
          order=(shared tools agent web orchestrator cli desktop)
          for pkg in "${order[@]}"; do
            tgz="$(ls release/npm/nervekit-${pkg}-*.tgz 2>/dev/null | head -n1 || true)"
            if [ -z "${tgz}" ]; then
              echo "No tarball found for ${pkg}" >&2
              exit 1
            fi
            name="@nervekit/${pkg}"
            version="$(node -e "console.log(require('./packages/${pkg}/package.json').version)")"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version} (already published)"
              continue
            fi
            echo "Publishing ${tgz} as ${name}@${version}"
            npm publish "${tgz}" --provenance --access public
          done

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - npm-smoke
      # Add build-windows here later so Windows assets publish into the same release.

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ github.ref_name }}"
          name: "Nerve ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/linux-desktop/*
