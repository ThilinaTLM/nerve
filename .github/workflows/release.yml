name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux desktop packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install Linux packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        run: pnpm release:verify-tag -- "${{ github.ref_name }}"

      - name: Type-check packages
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build Linux desktop artifacts
        run: pnpm release:desktop:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/*.rpm
            packages/desktop/release/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      # Add build-windows here later so Windows assets publish into the same release.

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_name }}"
          name: "Nerve ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/linux-desktop/*
