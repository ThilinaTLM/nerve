name: Release

on:
  push:
    tags:
      # Stable releases: v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+"
      # Pre-releases: v1.2.3-rc.1, v1.2.3-beta.2, etc.
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag and packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        run: pnpm release:verify-tag -- "${{ github.ref_name }}"

      - name: Check formatting, lint, and packages
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build all packages
        run: pnpm build

  npm-smoke:
    name: npm package smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: pnpm release:build

      - name: Pack npm tarballs
        run: node scripts/pack-npm.mjs

      - name: Verify built desktop runtime
        run: pnpm release:smoke:desktop

  built-artifact-smoke:
    name: Built workbench and sandbox protocol smoke
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: pnpm release:build

      - name: Smoke built workbench HTTP and WebSocket parity
        run: pnpm release:smoke:workbench

      - name: Smoke desktop resolution and CLI
        run: pnpm release:smoke:desktop

      - name: Smoke manager UI and manager-agent protocol
        run: pnpm release:smoke:sandbox

  image-smoke:
    name: Sandbox ${{ matrix.image }} image build and smoke
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        image: [sandbox-agent, sandbox-manager]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and smoke sandbox agent image
        if: matrix.image == 'sandbox-agent'
        run: pnpm build-image:sandbox-agent

      - name: Build and smoke portable sandbox manager image
        if: matrix.image == 'sandbox-manager'
        env:
          NERVE_SANDBOX_MANAGER_INSTALL_LOCAL_RUNTIMES: "false"
        run: pnpm build-image:sandbox-manager

  publish-npm:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest
    needs:
      - validate
      - npm-smoke
      - built-artifact-smoke
      - image-smoke
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Verify Node 24 and npm >= 11.5.1
        shell: bash
        run: |
          node_version="$(node --version)"
          echo "node: ${node_version}"
          case "${node_version}" in
            v24.*) ;;
            *) echo "Expected Node 24, got ${node_version}" >&2; exit 1 ;;
          esac
          npm_version="$(npm --version)"
          echo "npm: ${npm_version}"
          # Trusted publishing (OIDC) requires npm >= 11.5.1.
          if [ "$(printf '%s\n11.5.1\n' "${npm_version}" | sort -V | head -n1)" != "11.5.1" ]; then
            echo "Upgrading npm to satisfy trusted publishing (>= 11.5.1)"
            npm install -g npm@latest
            echo "npm: $(npm --version)"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: pnpm release:build

      - name: Pack npm tarballs
        run: node scripts/pack-npm.mjs

      - name: Publish tarballs (skip already-published versions)
        shell: bash
        run: |
          set -euo pipefail
          # Publish in dependency-friendly order.
          order=(contracts protocol harness tools host-runtime workbench-server desktop-shell)
          for pkg in "${order[@]}"; do
            tgz="$(ls release/npm/nervekit-${pkg}-*.tgz 2>/dev/null | head -n1 || true)"
            if [ -z "${tgz}" ]; then
              echo "No tarball found for ${pkg}" >&2
              exit 1
            fi
            name="@nervekit/${pkg}"
            version="$(node -e "console.log(require('./packages/${pkg}/package.json').version)")"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version} (already published)"
              continue
            fi
            echo "Publishing ${tgz} as ${name}@${version}"
            npm publish "${tgz}" --provenance --access public
          done
